version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SERVER_PORT}:8080"
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "${REDIS_PORT}:6379"
    env_file:
      - .env
    environment:
      - REDIS_PASSWORD=${REDIS_PASS}
    command: redis-server --requirepass ${REDIS_PASS}
    volumes:
      - redist_data:/data

  postgres:
    image: postgres:latest
    env_file:
      - .env
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data/pgdata

volumes:
  pg_data:
  redist_data: